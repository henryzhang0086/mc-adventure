<!DOCTYPE html><html lang="zh-CN"><head><meta charset="UTF-8">
<style>html,body{margin:0;background:#000;}canvas{display:block;}</style></head>
<body><canvas id="c" width="1080" height="1440"></canvas>
<script>
const X=document.getElementById('c').getContext('2d');
const W=1080,H=1440;
let SEED=98765; function rng(){SEED=(SEED*16807)%2147483647;return SEED/2147483647;}
const rr=(a,b)=>a+rng()*(b-a);
function rect(x,y,w,h,c){X.fillStyle=c;X.fillRect(x,y,w,h);}

/* ---- 明亮冒险天空 ---- */
const sky=X.createLinearGradient(0,0,0,H);
sky.addColorStop(0,'#5bb4ff');sky.addColorStop(0.45,'#9ad6ff');sky.addColorStop(0.7,'#cfeecb');sky.addColorStop(1,'#aee08e');
X.fillStyle=sky;X.fillRect(0,0,W,H);
// 太阳
X.fillStyle='#fff3b0';X.beginPath();X.arc(905,180,90,0,7);X.fill();
X.fillStyle='rgba(255,243,176,.35)';X.beginPath();X.arc(905,180,140,0,7);X.fill();
// 云
function cloud(x,y,s){X.save();X.translate(x,y);X.scale(s,s);X.fillStyle='#fff';
  X.fillRect(0,0,90,24);X.fillRect(18,-16,58,24);X.fillRect(40,-26,40,26);X.restore();}
cloud(120,180,1.5);cloud(640,120,1.1);cloud(380,300,0.9);cloud(820,360,1.2);
// 远山
function ridge(base,h,col,seed){X.fillStyle=col;X.beginPath();X.moveTo(0,H);let s=seed;
  for(let x=0;x<=W;x+=70){s=(s*9301+49297)%233280;X.lineTo(x,base-(s/233280)*h);}X.lineTo(W,H);X.closePath();X.fill();}
ridge(940,150,'rgba(60,150,90,.5)',7);
ridge(1010,130,'rgba(40,120,60,.65)',61);

/* ---- 四大 Boss 压阵(背景剪影 + 高光) ---- */
function bossCreeperKing(x,y){X.save();X.translate(x,y);
  X.strokeStyle='rgba(120,255,200,.7)';X.lineWidth=5;X.strokeRect(-58,-66,116,132);
  X.fillStyle='#4e9e36';X.fillRect(-54,-62,108,124);X.fillStyle='#0a0a0a';
  X.fillRect(-36,-40,26,26);X.fillRect(12,-40,26,26);X.fillRect(-12,-8,24,44);X.fillRect(-34,18,20,30);X.fillRect(14,18,20,30);X.restore();}
function bossWither(x,y){X.save();X.translate(x,y);X.fillStyle='#2b2b2b';X.fillRect(-46,-20,92,90);
  const hs=[[-44,-44,36],[0,-60,42],[44,-44,36]];for(const[hx,hy,s]of hs){X.fillStyle='#3a3a3a';X.fillRect(hx-s/2,hy-s/2,s,s);
  X.fillStyle='#ff5a2a';X.fillRect(hx-s*0.3,hy-4,s*0.22,s*0.18);X.fillRect(hx+s*0.08,hy-4,s*0.22,s*0.18);}X.restore();}
function bossWarden(x,y){X.save();X.translate(x,y);X.fillStyle='#0e3b3b';X.fillRect(-46,-86,92,172);
  X.fillStyle='#16a085';X.fillRect(-46,-86,92,20);X.fillStyle='rgba(29,233,182,.9)';X.fillRect(-18,-30,36,54);
  X.strokeStyle='#1de9b6';X.lineWidth=4;for(let i=0;i<4;i++){const ax=-30+i*20;X.beginPath();X.moveTo(ax,-86);X.lineTo(ax,-110);X.stroke();}X.restore();}
function bossDragon(x,y){X.save();X.translate(x,y);X.fillStyle='#241038';
  X.beginPath();X.moveTo(-14,-8);X.lineTo(-120,-70);X.lineTo(-84,30);X.closePath();X.fill();
  X.beginPath();X.moveTo(14,-8);X.lineTo(120,-70);X.lineTo(84,30);X.closePath();X.fill();
  X.fillRect(-50,-14,100,40);X.fillRect(40,-30,54,26);X.fillStyle='#c46bff';X.fillRect(70,-24,12,9);X.restore();}
X.globalAlpha=0.92;
bossCreeperKing(170,760);bossWither(420,770);bossWarden(690,740);bossDragon(910,760);
X.globalAlpha=1;
// 柔光
const gl=X.createLinearGradient(0,640,0,860);gl.addColorStop(0,'rgba(255,255,255,.18)');gl.addColorStop(1,'rgba(255,255,255,0)');
X.fillStyle=gl;X.fillRect(0,640,W,220);

/* ---- MC 方块地面 + 平台 ---- */
const GY=1150,T=40;
function ground(x0,x1){for(let x=x0;x<x1;x+=T){rect(x,GY,T,12,'#5bbf4a');for(let i=0;i<T;i+=6)rect(x+i,GY-3,3,6,'#69d957');
  rect(x,GY+12,T,T-12,'#7a5230');rect(x,GY+T,T,H,'#7f7f7f');
  for(let k=0;k<4;k++)rect(x+((k*13)%T),GY+14+((k*17)%(T*2)),3,3,'rgba(0,0,0,.16)');}}
ground(0,W);
// 木板平台
function plat(x,y,n){for(let i=0;i<n;i++){rect(x+i*T,y,T,18,'#9c6b3f');rect(x+i*T,y,T,4,'#b07d4a');X.strokeStyle='#6e4827';X.strokeRect(x+i*T+.5,y+.5,T-1,18);}}
plat(120,980,3);plat(740,940,3);
// TNT
function tnt(x,y){rect(x,y,T,T,'#c0392b');rect(x,y+16,T,9,'#f5f5f5');X.fillStyle='#000';X.font='bold 13px monospace';X.textAlign='center';X.fillText('TNT',x+T/2,y+24);}
tnt(560,GY-T);
// 岩浆缝
rect(300,GY+T*2,T*3,10,'#ff7a18');rect(300,GY+T*2,T*3,4,'#ffd000');

/* ---- 收集物 ---- */
function emerald(x,y,s){X.save();X.translate(x,y);X.scale(s,s);X.fillStyle='#1aa86a';
  X.beginPath();X.moveTo(0,-16);X.lineTo(16,0);X.lineTo(0,16);X.lineTo(-16,0);X.closePath();X.fill();
  X.fillStyle='#5cf2a0';X.beginPath();X.moveTo(0,-10);X.lineTo(9,0);X.lineTo(0,4);X.lineTo(-9,0);X.closePath();X.fill();X.restore();}
function heart(x,y,s){X.save();X.translate(x,y);X.scale(s,s);X.fillStyle='#ff4d5e';
  X.beginPath();X.moveTo(0,-6);X.bezierCurveTo(-12,-20,-26,-4,0,16);X.bezierCurveTo(26,-4,12,-20,0,-6);X.closePath();X.fill();
  X.fillStyle='rgba(255,255,255,.6)';X.fillRect(-7,-9,4,4);X.restore();}
function apple(x,y,s){X.save();X.translate(x,y);X.scale(s,s);X.fillStyle='#ffd24a';X.beginPath();X.arc(0,0,16,0,7);X.fill();
  X.strokeStyle='#ffe680';X.lineWidth=3;X.beginPath();X.arc(0,0,19,0,7);X.stroke();X.fillStyle='#6b3f1d';X.fillRect(-2,-20,4,8);X.fillStyle='#fff4b0';X.beginPath();X.arc(-5,-5,4,0,7);X.fill();X.restore();}
emerald(250,620,1.6);emerald(840,560,1.4);emerald(160,900,1.2);emerald(660,840,1.3);
apple(960,900,1.3);heart(380,560,1.3);

/* ---- 英雄 Steve(二段跳 + 挥剑) ---- */
function steve(x,y,s){X.save();X.translate(x,y);X.scale(s,s);
  // 二段跳特效
  X.fillStyle='rgba(255,255,255,.5)';for(let i=0;i<6;i++){const a=i/6*7;X.fillRect(Math.cos(a)*28-3,34+Math.sin(a)*10,6,6);}
  // 腿(跳跃收起)
  rect(-9,22,8,16,'#3a4a8c');rect(1,22,8,16,'#3a4a8c');
  // 身
  rect(-10,4,20,20,'#16a3a3');rect(-10,4,20,4,'#0f7d7d');
  // 后臂
  rect(-15,7,6,16,'#caa07a');
  // 头
  rect(-9,-16,18,18,'#caa07a');rect(-9,-16,18,6,'#5a3a25');rect(-9,-16,4,18,'#5a3a25');rect(5,-16,4,18,'#5a3a25');
  rect(2,-8,6,4,'#fff');rect(4,-8,3,4,'#3a6ea5');
  // 挥剑臂
  X.save();X.translate(10,6);X.rotate(-0.8);rect(-3,0,6,16,'#caa07a');
  rect(-2,14,4,20,'#c9d4e3');rect(-5,12,10,4,'#7c5a32'); // 剑
  X.fillStyle='rgba(255,255,255,.55)';X.beginPath();X.arc(0,22,22,-1.3,0.6);X.lineTo(0,22);X.fill(); // 剑光
  X.restore();X.restore();}
// 弓箭(刚加的技能, 点缀)
function arrow(x,y,a){X.save();X.translate(x,y);X.rotate(a);X.globalAlpha=0.7;X.fillStyle='#e8d8b0';X.fillRect(-26,-2,30,4);X.globalAlpha=1;X.fillStyle='#caa';X.fillRect(-26,-2,14,4);X.fillStyle='#888';X.fillRect(4,-3,6,6);X.restore();}
arrow(560,700,0.15);arrow(700,640,-0.1);
steve(500,1000,2.6);

/* ---- 标题 ---- */
function title(txt,cx,cy,size,fill){X.textAlign='center';X.font='900 '+size+'px "Microsoft YaHei",sans-serif';X.lineJoin='round';
  X.strokeStyle='#0a2e14';X.lineWidth=size*0.22;X.strokeText(txt,cx,cy);
  X.strokeStyle='#000';X.lineWidth=size*0.09;X.strokeText(txt,cx,cy);
  X.fillStyle=fill;X.fillText(txt,cx,cy);}
// 光晕
X.save();X.globalAlpha=0.5;X.filter='blur(36px)';X.fillStyle='#3df58a';X.font='900 210px "Microsoft YaHei"';X.textAlign='center';X.fillText('大冒险',W/2,360);X.filter='none';X.restore();
let tg=X.createLinearGradient(0,170,0,400);tg.addColorStop(0,'#eaffd0');tg.addColorStop(0.45,'#7CFC9A');tg.addColorStop(0.75,'#36c46a');tg.addColorStop(1,'#ffcf3a');
X.save();X.translate(8,10);title('MC 大冒险',W/2,360,205,'rgba(10,46,20,.6)');X.restore();
title('MC 大冒险',W/2,360,205,tg);
let tg2=X.createLinearGradient(0,400,0,470);tg2.addColorStop(0,'#fff3b0');tg2.addColorStop(1,'#ffb13a');
title('M C   A D V E N T U R E',W/2,452,54,tg2);
X.fillStyle='#0a3a1c';X.font='700 34px "Microsoft YaHei"';X.textAlign='center';
X.fillText('我的世界版马里奥 · 横版跳跃闯关',W/2,506);

/* ---- 四大 Boss 名牌(斜角标) ---- */
X.save();X.translate(948,560);X.rotate(0.16);
for(let i=0;i<12;i++){X.fillStyle=i%2?'#36c46a':'#ffcf3a';X.save();X.rotate(i/12*7);X.fillRect(-12,-92,24,42);X.restore();}
X.fillStyle='#0a2e14';X.beginPath();X.arc(0,0,66,0,7);X.fill();X.fillStyle='#7CFC9A';X.beginPath();X.arc(0,0,60,0,7);X.fill();
X.fillStyle='#0a2e14';X.font='900 30px "Microsoft YaHei"';X.textAlign='center';X.fillText('4 大',0,-4);X.fillText('Boss',0,30);X.restore();

/* ---- 特性徽章 ---- */
const feats=[['⚔','挥剑 + 射箭'],['🦘','二段跳 + 冲刺'],['💎','收集闯关'],['🧨','MC 机关']];
const fy=1245,fw=250;
feats.forEach((f,i)=>{const fx=40+i*fw;
  X.fillStyle='rgba(10,46,20,.55)';X.fillRect(fx,fy,fw-16,68);
  X.strokeStyle='#7CFC9A';X.lineWidth=2;X.strokeRect(fx,fy,fw-16,68);
  X.font='38px "Microsoft YaHei"';X.textAlign='left';X.fillStyle='#fff';X.fillText(f[0],fx+14,fy+46);
  X.font='700 25px "Microsoft YaHei"';X.fillStyle='#dfffe0';X.fillText(f[1],fx+66,fy+42);});

/* ---- 底部扫码 ---- */
X.fillStyle='rgba(8,28,14,.72)';X.fillRect(0,1336,W,104);
X.strokeStyle='#36c46a';X.lineWidth=3;X.beginPath();X.moveTo(0,1336);X.lineTo(W,1336);X.stroke();
const qr=new Image();
function bottomText(){X.fillStyle='#fff';X.textAlign='left';X.font='800 30px "Microsoft YaHei"';X.fillText('扫码即玩 · 免安装',150,1382);
  X.fillStyle='#bdf3c0';X.font='500 23px monospace';X.fillText('henryzhang0086.github.io/mc-adventure',150,1416);
  X.fillStyle='#ffcf3a';X.textAlign='right';X.font='900 40px "Microsoft YaHei"';X.fillText('▶ PLAY',W-40,1404);window.__ready=true;}
qr.onload=()=>{X.drawImage(qr,40,1346,84,84);bottomText();};
qr.onerror=bottomText;qr.src='qr-code.png';
</script></body></html>
